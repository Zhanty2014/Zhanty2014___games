;}this.closePanel();};c.appendChild(d);});}panel.classList.add('active');}
            executeKitchen(dish){const r=KITCHEN_RECIPES[dish];const p=this.player;if(!p.hasItem('厨房'))return;if(!Object.entries(r.needs).every(([m,q])=>p.hasItem(m,q)))return;Object.entries(r.needs).forEach(([m,q])=>p.useItem(m,q));if(r.hunger)p.hunger=Math.min(10,p.hunger+r.hunger);if(r.hp)p.hp=Math.min(10,p.hp+r.hp);if(r.thirst)p.thirst=Math.min(10,p.thirst+r.thirst);if(r.stamina)p.stamina=Math.min(10,p.stamina+r.stamina);if(r.temp)p.temp=Math.min(10,p.temp+r.temp);this.updateNutrition(r.categories);p.cookedDishes[dish]=true;this.addStory(`烹饪了 ${dish}`,'craft');this.renderAll();}
            executeUse(item){const p=this.player;if(!p.hasItem(item))return;if(item.startsWith('变质')){const sp=SPOILED_FOOD[item];if(sp){if(sp.hp<0)p.hp=Math.max(0,p.hp+sp.hp);if(sp.hunger>0)p.hunger=Math.min(10,p.hunger+sp.hunger);}p.useItem(item);this.addStory('吃下变质食物','combat');this.renderAll();return;}if(item==='庇护所'){if(p.shelterActive)return;p.useItem('庇护所');p.shelterActive=true;}else if(item==='陷阱'){p.useItem('陷阱');p.trapLocation={x:p.x,y:p.y};p.trapDurability=3;}else if(item==='绷带'){p.hp=Math.min(10,p.hp+2);p.useItem('绷带');}else if(item==='药水'){p.hp=Math.min(10,p.hp+2);p.sanity=Math.min(10,p.sanity+2);p.useItem('药水');}else if(item==='炸药'){p.useItem('炸药');}else if(item==='冰雪'){p.useItem('冰雪');p.thirst=Math.min(10,p.thirst+1);}else if(item==='水'){p.thirst=Math.min(10,p.thirst+3);p.useItem('水');}else if(item==='盐'){return;}else{const stam=FOOD_STAMINA[item]||2;p.hunger=Math.min(10,p.hunger+stam);p.useItem(item);const cat=FOOD_CATEGORIES[item];if(cat){p.eatenCategories[cat]=true;this.updateNutrition([cat]);}if(!this.cheatMode){const rem=MAX_FOOD_STAMINA_PER_DAY-p.dailyFoodStaminaRestored;if(rem>0){const add=Math.min(stam,rem);p.stamina=Math.min(10,p.stamina+add);p.dailyFoodStaminaRestored+=add;}}}if(Object.values(p.eatenCategories).filter(Boolean).length>=7)this.checkAchievement('美食家');if(Object.keys(p.cookedDishes).length>=Object.keys(KITCHEN_RECIPES).length)this.checkAchievement('全能厨师');this.renderAll();}
            showInventory(){if(this.gameOver)return;const p=this.player;const panel=document.getElementById('panelOverlay');document.getElementById('panelTitle').textContent='背包';const c=document.getElementById('panelContent');c.innerHTML='';const items=Object.keys(p.inventory);const tools=Object.keys(p.tools);if(items.length){let s='';items.forEach(k=>s+=`${k}×${p.inventory[k].qty} `);c.innerHTML+=`<div class='panel-item'><span>📦</span><span>${s}</span></div>`;}if(tools.length){let s='';tools.forEach(t=>{let q='';if(p.tools[t].quality)q=`[${p.tools[t].quality}]`;s+=`${t}${q}(${p.tools[t].durability}) `;});c.innerHTML+=`<div class='panel-item'><span>🔧</span><span>${s}</span></div>`;}panel.classList.add('active');}
            showAchievements(){const panel=document.getElementById('panelOverlay');document.getElementById('panelTitle').textContent='成就';const c=document.getElementById('panelContent');c.innerHTML='';Object.keys(this.achievements).forEach(a=>c.innerHTML+=`<div class='panel-item'>🏆 ${a}</div>`);panel.classList.add('active');}
            showSkills(){const panel=document.getElementById('panelOverlay'),t=document.getElementById('panelTitle'),c=document.getElementById('panelContent');t.textContent='🧬 技能树';c.innerHTML='';const skills=this.player.skills;const tabDiv=document.createElement('div');tabDiv.className='skill-tab';['采集','制作','战斗','探索','生存'].forEach(cat=>{const btn=document.createElement('button');btn.className=`skill-tab-btn ${cat===this.currentSkillTab?'active':''}`;btn.textContent=`${cat} Lv${skills.levels[cat]}`;btn.addEventListener('click',()=>{this.currentSkillTab=cat;this.showSkills();});tabDiv.appendChild(btn);});c.appendChild(tabDiv);const currentLevel=skills.levels[this.currentSkillTab];if(currentLevel>=10){c.innerHTML+='<div style="color:#f0f4ff;margin:5px 0;">技能点: '+skills.points+' | 经验: 已满级</div>';}else{let maxExp=(currentLevel+1)*100;let currentExp=skills.experience[this.currentSkillTab]||0;const progress=Math.min(100,(currentExp/maxExp)*100)||0;const infoDiv=document.createElement('div');infoDiv.innerHTML=`<div style="color:#f0f4ff;margin:5px 0;">技能点: ${skills.points} | 经验: ${currentExp}/${maxExp}</div><div class="exp-bar"><div class="exp-fill" style="width:${progress}%"></div></div>`;c.appendChild(infoDiv);}const tree=SKILL_TREE[this.currentSkillTab];if(tree){tree.nodes.forEach(node=>{const div=document.createElement('div');div.className='skill-node';const learned=skills.unlocked[node.id];const canLearn=!learned&&skills.points>=node.cost&&node.requires.every(req=>skills.unlocked[req]);div.innerHTML=`<span class="desc">${node.name} - ${node.desc}</span>`;const btn=document.createElement('button');btn.textContent=learned?'已学':(canLearn?'学习':'锁定');btn.disabled=!canLearn||learned;if(canLearn&&!learned){btn.addEventListener('click',()=>{skills.unlocked[node.id]=true;skills.points-=node.cost;this.showSkills();this.renderAll();});}div.appendChild(btn);c.appendChild(div);});}panel.classList.add('active');}
            triggerZoneEvent(x,y){const z=this.getZone(x,y);if(!z||z.explored)return;z.explored=true;if(rand(1,100)<=25){const e=pick([{t:'发现野果+3',f:p=>p.addItem('野果',3)},{t:'泉眼+3水',f:p=>p.thirst=Math.min(10,p.thirst+3)}]);e.f(this.player);this.addStory(`[${z.type}] ${e.t}`,'event');}else this.addStory(`探索了 ${z.type}`,'info');}
            enableCheat(){if(!this.cheatMode)document.getElementById('confirmOverlay').classList.add('active');}
            confirmCheat(){this.cheatMode=true;const p=this.player;p.hp=p.hunger=p.thirst=p.stamina=p.sanity=p.temp=p.nutrition=999;p.hasStorageRoom=true;'木材,石头,纤维,野果,水,鱼,肉,毛皮,铁矿石,煤炭,草药,铁锭,冰雪,硫磺,蝙蝠,蘑菇,铜矿石,锡矿石,铜锭,锡锭,青铜锭,盐,海藻,贝壳,野菜'.split(',').forEach(i=>p.addItem(i,999));['木斧','石斧','铜斧','青铜斧','铁斧','木镐','石镐','铜镐','青铜镐','铁镐','木剑','石剑','铜剑','青铜剑','铁剑','弩','铁甲','铜甲','青铜甲','厨房','工作台','储藏室','储物箱','熔炉'].forEach(t=>p.addTool(t,1));p.addItem('弩箭',999);p.skills.points=100;for(let c in SKILL_TREE)SKILL_TREE[c].nodes.forEach(n=>p.skills.unlocked[n.id]=true);document.getElementById('confirmOverlay').classList.remove('active');this.addStory('⚡外挂激活','system');this.renderAll();}
            closePanel(){document.getElementById('panelOverlay').classList.remove('active');}
        }
        const coverMain=document.getElementById('coverMain'),coverMenu=document.getElementById('coverMenu'),coverNewGame=document.getElementById('coverNewGame'),coverLoadGame=document.getElementById('coverLoadGame'),coverChangelog=document.getElementById('coverChangelog'),coverQA=document.getElementById('coverQA'),coverOverlay=document.getElementById('coverOverlay');
        function showCover(s){coverMain.style.display=coverMenu.style.display=coverNewGame.style.display=coverLoadGame.style.display=coverChangelog.style.display=coverQA.style.display='none';if(s==='main')coverMain.style.display='block';else if(s==='menu')coverMenu.style.display='block';else if(s==='new')coverNewGame.style.display='block';else if(s==='load')coverLoadGame.style.display='block';else if(s==='changelog')coverChangelog.style.display='block';else if(s==='qa')coverQA.style.display='block';}
        function startNewGame(d){const n=document.getElementById('saveNameInput').value.trim()||'荒野';game=new Game(d,Date.now().toString());game.saveGame(n);coverOverlay.classList.remove('active');game.renderAll();}
        function loadSave(id){if(!game)game=new Game(30,id);else game.saveId=id;if(game.loadGame(id)){coverOverlay.classList.remove('active');game.renderAll();}else alert('损坏');}
        function deleteSave(id){localStorage.removeItem(`wild_${id}`);const m=JSON.parse(localStorage.getItem('wild_meta')||'[]').filter(i=>i.id!==id);localStorage.setItem('wild_meta',JSON.stringify(m));renderSaveList();}
        function renameSave(id){const meta=JSON.parse(localStorage.getItem('wild_meta')||'[]');const save=meta.find(i=>i.id===id);if(!save)return;const newName=prompt('请输入新名称',save.name);if(newName&&newName.trim()){save.name=newName.trim();localStorage.setItem('wild_meta',JSON.stringify(meta));renderSaveList();}}
        function exportSave(id){const r=localStorage.getItem(`wild_${id}`);if(!r)return;const b=new Blob([r]);const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`wild_${id}.json`;a.click();}
        function importSave(f){const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);const id=Date.now().toString();localStorage.setItem(`wild_${id}`,JSON.stringify(d));const m=JSON.parse(localStorage.getItem('wild_meta')||'[]');m.push({id,name:'导入',date:new Date().toLocaleString()});localStorage.setItem('wild_meta',JSON.stringify(m));renderSaveList();}catch{}};r.readAsText(f);}
        function renderSaveList(){const c=document.getElementById('saveListContainer');const m=JSON.parse(localStorage.getItem('wild_meta')||'[]');c.innerHTML='';m.forEach(i=>{const d=document.createElement('div');d.className='save-list-item';d.innerHTML=`<span>${i.name} (${i.date})</span><button data-id="${i.id}" class="load">读</button><button data-id="${i.id}" class="rename">改名</button><button data-id="${i.id}" class="del">删</button><button data-id="${i.id}" class="exp">导出</button>`;c.appendChild(d);});c.querySelectorAll('.load').forEach(b=>b.addEventListener('click',e=>loadSave(e.target.dataset.id)));c.querySelectorAll('.rename').forEach(b=>b.addEventListener('click',e=>renameSave(e.target.dataset.id)));c.querySelectorAll('.del').forEach(b=>b.addEventListener('click',e=>deleteSave(e.target.dataset.id)));c.querySelectorAll('.exp').forEach(b=>b.addEventListener('click',e=>exportSave(e.target.dataset.id)));}
        document.getElementById('beginBtn').addEventListener('click',()=>showCover('menu'));document.getElementById('changelogBtn').addEventListener('click',()=>showCover('changelog'));document.getElementById('qaBtn').addEventListener('click',()=>showCover('qa'));document.getElementById('backChangelogBtn').addEventListener('click',()=>showCover('main'));document.getElementById('backQABtn').addEventListener('click',()=>showCover('main'));document.getElementById('newGameBtn').addEventListener('click',()=>showCover('new'));document.getElementById('loadGameBtn').addEventListener('click',()=>{renderSaveList();showCover('load');});document.getElementById('backBtn').addEventListener('click',()=>showCover('main'));document.getElementById('backNewGameBtn').addEventListener('click',()=>showCover('menu'));document.getElementById('backLoadBtn').addEventListener('click',()=>showCover('menu'));document.getElementById('exportBtn').addEventListener('click',()=>{const m=JSON.parse(localStorage.getItem('wild_meta')||'[]');const all={};m.forEach(i=>all[i.id]=localStorage.getItem(`wild_${i.id}`));const b=new Blob([JSON.stringify(all)]);const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='wild_all.json';a.click();});document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());document.getElementById('importFile').addEventListener('change',e=>{if(e.target.files.length)importSave(e.target.files[0]);});document.getElementById('customBtn').addEventListener('click',()=>document.getElementById('customDaysDiv').style.display='block');document.getElementById('startCustomBtn').addEventListener('click',()=>{const v=parseInt(document.getElementById('customDaysInput').value);if(v>0)startNewGame(v);});document.querySelectorAll('#coverNewGame .start-btn[data-days]').forEach(b=>b.addEventListener('click',e=>startNewGame(parseInt(e.target.dataset.days))));document.getElementById('restartBtn').addEventListener('click',()=>{document.getElementById('endOverlay').classList.remove('active');document.getElementById('coverOverlay').classList.add('active');showCover('menu');});document.getElementById('saveBtn').addEventListener('click',()=>game&&game.saveGame(null,false));document.getElementById('quitBtn').addEventListener('click',()=>game&&game.quitToMenu());document.getElementById('collectBtn').addEventListener('click',()=>game&&game.showCollectPanel());document.getElementById('craftBtn').addEventListener('click',()=>game&&game.showCraftPanel());document.getElementById('useBtn').addEventListener('click',()=>game&&game.showUsePanel());document.getElementById('inventoryBtn').addEventListener('click',()=>game&&game.showInventory());document.getElementById('achievementsBtn').addEventListener('click',()=>game&&game.showAchievements());document.getElementById('skillsBtn').addEventListener('click',()=>game&&game.showSkills());document.getElementById('nextDayBtn').addEventListener('click',()=>game&&game.nextDay());document.querySelectorAll('.dir-btn').forEach(b=>b.addEventListener('click',()=>{if(game){const d={'n':[0,-1],'s':[0,1],'e':[1,0],'w':[-1,0]};game.move(...d[b.dataset.dir]);}}));document.getElementById('cheatBtn').addEventListener('click',()=>game&&game.enableCheat());document.getElementById('confirmYes').addEventListener('click',()=>game&&game.confirmCheat());document.getElementById('confirmNo').addEventListener('click',()=>document.getElementById('confirmOverlay').classList.remove('active'));document.getElementById('panelClose').addEventListener('click',()=>game&&game.closePanel());document.getElementById('panelOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget&&game)game.closePanel();});document.getElementById('combatOverlay').addEventListener('click',()=>{});
    })();
</script>
